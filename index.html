<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Marketing Årshjul</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f5f5f4;--bg3:#eeece8;
  --text:#1a1a18;--text2:#5a5a56;--text3:#9a9a94;
  --border:#e0ddd6;--border2:#c8c5be;
  --info-bg:#e6f1fb;--info-text:#185FA5;--info-border:#b5d4f4;
  --danger:#E24B4A;
  --radius:8px;--radius-lg:12px;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1a;--bg2:#252522;--bg3:#2e2e2a;
    --text:#e8e6e0;--text2:#a8a89e;--text3:#686864;
    --border:#38382e;--border2:#4a4a40;
    --info-bg:#0c2a44;--info-text:#85b7eb;--info-border:#185FA5;
  }
}
body{background:var(--bg);color:var(--text);min-height:100vh;padding:16px}
#app{max-width:1200px;margin:0 auto}

.topbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.topbar h1{font-size:16px;font-weight:500;color:var(--text)}
.year-btn{font-size:12px;padding:4px 12px;border-radius:20px;border:0.5px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer}
.year-btn.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.board-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
.btab{font-size:11px;padding:3px 10px;border-radius:16px;border:0.5px solid var(--border);background:var(--bg2);color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap}
.btab.active{background:var(--bg);border-color:var(--border2);color:var(--text);font-weight:500}
.btab .bdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.btab-add{color:var(--text3);border-style:dashed}
.tl-wrap{overflow-x:auto;padding-bottom:6px}
.tl-inner{min-width:860px}
.month-header{display:flex;margin-left:126px;margin-bottom:2px}
.mhcell{flex:none;font-size:10px;color:var(--text3);font-weight:500;text-align:center;border-left:0.5px solid var(--border);padding:0 2px;overflow:hidden;white-space:nowrap}
.week-header{display:flex;margin-left:126px;margin-bottom:4px}
.wcell{flex:none;font-size:9px;color:var(--text3);text-align:center;border-left:0.5px solid transparent;padding-top:1px}
.wcell.month-start{border-left:0.5px solid var(--border2)}
.cat-row{display:flex;align-items:stretch;margin-bottom:3px;min-height:38px}
.cat-label{flex:0 0 126px;font-size:11px;font-weight:500;color:var(--text2);padding:0 10px 0 0;display:flex;align-items:center;justify-content:flex-end;text-align:right;line-height:1.3;gap:5px}
.cat-label .clabel-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.cat-grid{flex:1;display:flex;position:relative;background:var(--bg2);border-radius:4px;overflow:hidden;height:38px}
.week-cell{flex:none;height:100%;border-left:0.5px solid transparent;position:absolute;top:0;bottom:0;cursor:pointer;transition:background .1s}
.week-cell:hover{background:rgba(128,128,128,.12)}
.week-cell.month-start{border-left:0.5px solid var(--border)}
.week-cell.today-week{background:rgba(83,74,183,.1)}
.act-block{position:absolute;top:3px;bottom:3px;border-radius:4px;cursor:pointer;display:flex;align-items:center;padding:0 6px;font-size:10px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;z-index:2;user-select:none;transition:opacity .15s}
.act-block:hover{opacity:.82;z-index:3}
.act-block.single-week{padding:0 3px;font-size:9px}
.today-line{position:absolute;top:0;bottom:0;width:1.5px;background:#E24B4A;opacity:.7;z-index:5;pointer-events:none}
.panel{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:12px 14px;margin-top:12px}
.panel h3{font-size:13px;font-weight:500;margin-bottom:8px}
.evt-list{list-style:none}
.evt-list li{display:flex;align-items:center;gap:7px;font-size:11px;padding:4px 0;border-bottom:0.5px solid var(--border)}
.evt-list li:last-child{border:none}
.edot{width:7px;height:7px;border-radius:2px;flex-shrink:0}
.del{margin-left:auto;cursor:pointer;color:var(--text3);font-size:15px;line-height:1;border:none;background:none;padding:0 3px}
.del:hover{color:var(--danger)}
.input-row{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.input-row input,.input-row select{flex:1 1 80px;font-size:11px;padding:5px 8px;border-radius:6px;border:0.5px solid var(--border2);background:var(--bg2);color:var(--text);min-width:70px}
.input-row button{font-size:11px;padding:5px 12px;border-radius:6px;border:0.5px solid var(--border2);background:var(--bg);color:var(--text);cursor:pointer;white-space:nowrap}
.input-row button:hover{background:var(--bg2)}
.input-row button.danger{color:var(--danger)}
.empty-hint{color:var(--text3);font-size:11px;font-style:italic}
.save-badge{font-size:10px;color:var(--text3);margin-left:auto}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--radius-lg);padding:16px;width:300px;max-width:92vw}
.modal h3{font-size:13px;font-weight:500;margin-bottom:10px}
.modal label{font-size:11px;color:var(--text2);display:block;margin-bottom:3px;margin-top:8px}
.modal input,.modal select{width:100%;font-size:12px;padding:6px 8px;border-radius:6px;border:0.5px solid var(--border2);background:var(--bg2);color:var(--text);margin-bottom:2px}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}
.modal-btns button{font-size:11px;padding:5px 14px;border-radius:6px;border:0.5px solid var(--border2);background:var(--bg2);color:var(--text);cursor:pointer}
.modal-btns .confirm{background:var(--text);color:var(--bg);border-color:var(--text)}
.divider{border:none;border-top:0.5px solid var(--border);margin:8px 0}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <h1 id="board-title">Marketing årshjul</h1>
    <button class="year-btn active" id="btn2026" onclick="setYear(2026)">2026</button>
    <button class="year-btn" id="btn2027" onclick="setYear(2027)">2027</button>
    <span class="save-badge" id="save-ind"></span>
  </div>
  <div class="board-tabs" id="board-tabs"></div>
  <div class="tl-wrap"><div class="tl-inner" id="tl-inner"></div></div>
  <div class="panel" id="side-panel">
    <p class="empty-hint">Klik på en uge i et kategori-spor for at tilføje en aktivitet — eller klik på en eksisterende blok for at redigere.</p>
  </div>
</div>
<div id="modal-container"></div>

<script>
const CATS=[
  {id:'kampagner', name:'Kampagner',       color:'#534AB7'},
  {id:'some',      name:'SoMe & content',  color:'#0F6E56'},
  {id:'events',    name:'Events & messer', color:'#993C1D'},
  {id:'email',     name:'Email & nyh.',    color:'#185FA5'},
  {id:'pr',        name:'PR & presse',     color:'#993556'},
  {id:'paid',      name:'Paid ads',        color:'#BA7517'},
];

const DEFAULT_BOARDS=[
  {id:'all',  name:'Samlet overblik', catIds:CATS.map(c=>c.id)},
  ...CATS.map(c=>({id:'cat_'+c.id, name:c.name, catIds:[c.id]})),
];

const MONTHS=['Jan','Feb','Mar','Apr','Maj','Jun','Jul','Aug','Sep','Okt','Nov','Dec'];
const STOR_KEY='mktaarshjul-v1';

let S={year:2026,boardId:'all',boards:JSON.parse(JSON.stringify(DEFAULT_BOARDS)),acts:{},nextActId:1};

// ── Storage ──
function persist(){
  try{
    localStorage.setItem(STOR_KEY,JSON.stringify({boards:S.boards,acts:S.acts,nextActId:S.nextActId}));
    showSave('Gemt ✓');
  }catch(e){showSave('Gem fejlede');}
}
function loadData(){
  try{
    const raw=localStorage.getItem(STOR_KEY);
    if(raw){const d=JSON.parse(raw);if(d.boards)S.boards=d.boards;if(d.acts)S.acts=d.acts;if(d.nextActId)S.nextActId=d.nextActId;}
  }catch(e){}
  render();
}
function showSave(msg){const el=document.getElementById('save-ind');el.textContent=msg;setTimeout(()=>el.textContent='',2000);}

// ── Week helpers ──
function isoWeek(d){const dt=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));const day=dt.getUTCDay()||7;dt.setUTCDate(dt.getUTCDate()+4-day);const ys=new Date(Date.UTC(dt.getUTCFullYear(),0,1));return Math.ceil((((dt-ys)/86400000)+1)/7);}
function weeksInYear(y){const d=new Date(y,11,31);const w=isoWeek(d);return w===1?isoWeek(new Date(y,11,24)):w;}
function weekMonday(y,w){const j=new Date(y,0,4);const jd=j.getDay()||7;const m=new Date(j);m.setDate(j.getDate()-jd+1+(w-1)*7);return m;}
function weekMonth(y,w){return weekMonday(y,w).getMonth();}
function buildWeeks(y){return Array.from({length:weeksInYear(y)},(_,i)=>i+1);}

// ── Helpers ──
function actKey(y,catId,id){return`${y}-${catId}-${id}`;}
function getActs(y,catId){return Object.values(S.acts).filter(a=>a.year===y&&a.catId===catId);}
function currentBoard(){return S.boards.find(b=>b.id===S.boardId)||S.boards[0];}
function visibleCats(){const b=currentBoard();return CATS.filter(c=>b.catIds.includes(c.id));}

// ── Render ──
function render(){renderBoardTabs();renderTimeline();renderPanel();}

function renderBoardTabs(){
  const el=document.getElementById('board-tabs');
  el.innerHTML=S.boards.map(b=>{
    const cat=CATS.find(c=>'cat_'+c.id===b.id);
    const color=cat?cat.color:'#534AB7';
    return`<button class="btab${b.id===S.boardId?' active':''}" onclick="setBoard('${b.id}')"><span class="bdot" style="background:${color}"></span>${b.name}</button>`;
  }).join('')+`<button class="btab btab-add" onclick="addBoard()">+ Nyt board</button>`;
  document.getElementById('board-title').textContent=currentBoard().name;
}

function renderTimeline(){
  const y=S.year;
  const weeks=buildWeeks(y);
  const nW=weeks.length;
  const cats=visibleCats();
  const containerW=document.getElementById('tl-inner').offsetWidth||900;
  const availW=Math.max(containerW-130,600);
  const CELL_W=Math.max(13,Math.floor(availW/nW));

  // Month spans
  const monthSpans=[];let cur=weekMonth(y,weeks[0]),start=0;
  for(let i=1;i<=nW;i++){const m=i<nW?weekMonth(y,weeks[i]):-1;if(m!==cur||i===nW){monthSpans.push({month:cur,start,end:i-1});cur=m;start=i;}}

  const today=new Date();
  const todayW=today.getFullYear()===y?isoWeek(today):null;
  const todayIdx=todayW?weeks.indexOf(todayW):-1;

  let html='';

  // Month header
  html+='<div class="month-header">';
  for(const ms of monthSpans){const span=ms.end-ms.start+1;html+=`<div class="mhcell" style="width:${span*CELL_W}px">${MONTHS[ms.month]}</div>`;}
  html+='</div>';

  // Week numbers
  html+='<div class="week-header">';
  for(let i=0;i<nW;i++){const w=weeks[i];const isMS=i===0||weekMonth(y,weeks[i])!==weekMonth(y,weeks[i-1]);html+=`<div class="wcell${isMS?' month-start':''}" style="width:${CELL_W}px">${CELL_W>15?w:(w%4===1?w:'')}</div>`;}
  html+='</div>';

  // Category rows
  for(const cat of cats){
    const acts=getActs(y,cat.id);
    html+=`<div class="cat-row">`;
    html+=`<div class="cat-label"><span class="clabel-dot" style="background:${cat.color}"></span>${cat.name}</div>`;
    html+=`<div class="cat-grid" id="grid-${cat.id}">`;

    // Background week cells
    for(let i=0;i<nW;i++){
      const w=weeks[i];
      const isMS=i>0&&weekMonth(y,weeks[i])!==weekMonth(y,weeks[i-1]);
      const isTW=i===todayIdx;
      html+=`<div class="week-cell${isMS?' month-start':''}${isTW?' today-week':''}" style="width:${CELL_W}px;left:${i*CELL_W}px" onclick="clickWeek('${cat.id}',${w})"></div>`;
    }

    // Today line
    if(todayIdx>=0)html+=`<div class="today-line" style="left:${todayIdx*CELL_W+CELL_W/2}px"></div>`;

    // Activity blocks
    for(const act of acts){
      const s=weeks.indexOf(act.weekStart);
      const e=weeks.indexOf(act.weekEnd);
      if(s<0)continue;
      const eIdx=e<0?nW-1:e;
      const left=s*CELL_W+1;
      const width=(eIdx-s+1)*CELL_W-2;
      const bg=act.color||cat.color;
      const hex=bg.replace('#','');
      const r=parseInt(hex.substring(0,2),16),g=parseInt(hex.substring(2,4),16),b=parseInt(hex.substring(4,6),16);
      const lum=(0.299*r+0.587*g+0.114*b)/255;
      const tc=lum>0.55?'#333':'#fff';
      const isSingle=eIdx===s;
      html+=`<div class="act-block${isSingle?' single-week':''}" style="left:${left}px;width:${width}px;background:${bg};color:${tc}" title="${act.title} (uge ${act.weekStart}–${act.weekEnd})" onclick="clickAct(event,'${act.id}','${cat.id}')">${act.title}</div>`;
    }
    html+='</div></div>';
  }
  document.getElementById('tl-inner').innerHTML=html;
}

let PS={mode:'hint',catId:null,week:null,actId:null};

function renderPanel(){
  const el=document.getElementById('side-panel');
  const y=S.year;
  if(PS.mode==='hint'){el.innerHTML='<p class="empty-hint">Klik på en uge i et kategori-spor for at tilføje en aktivitet — eller klik på en eksisterende blok for at redigere.</p>';return;}

  if(PS.mode==='week'){
    const cat=CATS.find(c=>c.id===PS.catId);
    const acts=getActs(y,PS.catId).filter(a=>a.weekStart<=PS.week&&a.weekEnd>=PS.week);
    const catOpts=CATS.map(c=>`<option value="${c.id}"${c.id===PS.catId?' selected':''}>${c.name}</option>`).join('');
    const wOpts=buildWeeks(y).map(w=>`<option value="${w}"${w===PS.week?' selected':''}>${w}</option>`).join('');
    el.innerHTML=`<h3 style="display:flex;align-items:center;gap:7px"><span style="width:9px;height:9px;border-radius:2px;background:${cat.color};display:inline-block;flex-shrink:0"></span>${cat.name} — uge ${PS.week}</h3>
      ${acts.length?`<ul class="evt-list">${acts.map(a=>`<li><span class="edot" style="background:${a.color||cat.color}"></span><span>${a.title}</span><span style="font-size:10px;color:var(--text3)">uge ${a.weekStart}–${a.weekEnd}</span><button class="del" onclick="deleteAct('${a.id}','${cat.id}')">×</button></li>`).join('')}</ul>`:'<p class="empty-hint" style="margin-bottom:6px">Ingen aktiviteter i denne uge.</p>'}
      <hr class="divider">
      <p style="font-size:11px;font-weight:500;margin-bottom:6px;color:var(--text2)">Tilføj aktivitet</p>
      <div class="input-row"><input type="text" id="act-title" placeholder="Aktivitetsnavn..." maxlength="60"/></div>
      <div class="input-row" style="margin-top:5px">
        <select id="act-cat">${catOpts}</select>
        <select id="act-ws" title="Start uge">${wOpts}</select>
        <select id="act-we" title="Slut uge">${wOpts}</select>
      </div>
      <div class="input-row" style="margin-top:5px"><button onclick="addAct()">Tilføj aktivitet</button></div>`;
    document.getElementById('act-title').addEventListener('keydown',e=>{if(e.key==='Enter')addAct();});
    return;
  }

  if(PS.mode==='act'){
    const act=Object.values(S.acts).find(a=>a.id===PS.actId);
    if(!act){PS.mode='hint';renderPanel();return;}
    const cat=CATS.find(c=>c.id===act.catId);
    const catOpts=CATS.map(c=>`<option value="${c.id}"${c.id===act.catId?' selected':''}>${c.name}</option>`).join('');
    const wOptsS=buildWeeks(y).map(w=>`<option value="${w}"${w===act.weekStart?' selected':''}>${w}</option>`).join('');
    const wOptsE=buildWeeks(y).map(w=>`<option value="${w}"${w===act.weekEnd?' selected':''}>${w}</option>`).join('');
    el.innerHTML=`<h3>Rediger aktivitet</h3>
      <div class="input-row"><input type="text" id="edit-title" value="${act.title}" maxlength="60"/></div>
      <div class="input-row" style="margin-top:5px">
        <select id="edit-cat">${catOpts}</select>
        <select id="edit-ws">${wOptsS}</select>
        <select id="edit-we">${wOptsE}</select>
      </div>
      <div class="input-row" style="margin-top:5px">
        <button onclick="saveAct('${act.id}')">Gem ændringer</button>
        <button class="danger" onclick="deleteAct('${act.id}','${act.catId}')">Slet</button>
        <button onclick="PS.mode='hint';renderPanel()">Luk</button>
      </div>`;
    return;
  }
}

// ── Interactions ──
function setYear(y){S.year=y;document.getElementById('btn2026').className='year-btn'+(y===2026?' active':'');document.getElementById('btn2027').className='year-btn'+(y===2027?' active':'');PS={mode:'hint'};render();}
function setBoard(id){S.boardId=id;PS={mode:'hint'};render();}
function clickWeek(catId,week){PS={mode:'week',catId,week};renderPanel();}
function clickAct(e,actId,catId){e.stopPropagation();PS={mode:'act',actId,catId};renderPanel();}

function addAct(){
  const title=document.getElementById('act-title').value.trim();
  if(!title)return;
  const catId=document.getElementById('act-cat').value;
  const ws=parseInt(document.getElementById('act-ws').value);
  const we=parseInt(document.getElementById('act-we').value);
  const id='a'+S.nextActId++;
  S.acts[actKey(S.year,catId,id)]={id,catId,year:S.year,title,weekStart:Math.min(ws,we),weekEnd:Math.max(ws,we),color:CATS.find(c=>c.id===catId)?.color};
  persist();PS={mode:'week',catId,week:Math.min(ws,we)};render();
}

function saveAct(actId){
  const act=Object.values(S.acts).find(a=>a.id===actId);if(!act)return;
  const newTitle=document.getElementById('edit-title').value.trim();
  const newCat=document.getElementById('edit-cat').value;
  const ws=parseInt(document.getElementById('edit-ws').value);
  const we=parseInt(document.getElementById('edit-we').value);
  if(!newTitle)return;
  if(newCat!==act.catId){delete S.acts[actKey(S.year,act.catId,act.id)];act.catId=newCat;act.color=CATS.find(c=>c.id===newCat)?.color;S.acts[actKey(S.year,newCat,act.id)]=act;}
  act.title=newTitle;act.weekStart=Math.min(ws,we);act.weekEnd=Math.max(ws,we);
  persist();PS={mode:'hint'};render();
}

function deleteAct(actId,catId){
  const k=Object.keys(S.acts).find(k=>S.acts[k].id===actId);
  if(k)delete S.acts[k];
  persist();PS={mode:'hint'};render();
}

function addBoard(){
  const mc=document.getElementById('modal-container');
  mc.innerHTML=`<div class="modal-bg" onclick="closeModal(event)"><div class="modal" onclick="event.stopPropagation()">
    <h3>Nyt board</h3>
    <label>Navn</label><input type="text" id="m-name" placeholder="Fx Q1 2026, Black Friday..." maxlength="40"/>
    <label>Vis kategorier</label>
    ${CATS.map(c=>`<label style="display:flex;align-items:center;gap:7px;font-size:12px;font-weight:400;margin-top:5px;cursor:pointer"><input type="checkbox" value="${c.id}" checked style="width:auto;margin:0"/> ${c.name}</label>`).join('')}
    <div class="modal-btns"><button onclick="closeModal()">Annuller</button><button class="confirm" onclick="createBoard()">Opret</button></div>
  </div></div>`;
}

function closeModal(e){if(!e||e.target.classList.contains('modal-bg'))document.getElementById('modal-container').innerHTML='';}

function createBoard(){
  const name=document.getElementById('m-name').value.trim();if(!name)return;
  const catIds=[...document.querySelectorAll('#modal-container input[type=checkbox]:checked')].map(cb=>cb.value);
  if(!catIds.length)return;
  const id='custom_'+Date.now();
  S.boards.push({id,name,catIds});S.boardId=id;
  document.getElementById('modal-container').innerHTML='';
  persist();render();
}

loadData();
window.addEventListener('resize',()=>renderTimeline());
</script>
</body>
</html>
